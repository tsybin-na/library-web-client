<div class="container">

  <div class="button-panel">
    <!-- Button trigger modal -->
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#bookModal">Добавить книгу
    </button>
    <button type="button" class="btn btn-primary" (click)="init()">Обновить</button>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="bookModal" tabindex="-1" aria-labelledby="bookModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="bookModalLabel">Modal title</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          ...
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" (click)="closeBookModal()">Close
          </button>
          <button type="button" class="btn btn-primary">Save changes</button>
        </div>
      </div>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-hover">
      <thead>
      <tr>
        <th scope="col">#</th>
        <th scope="col">Наименование</th>
        <th scope="col">Дата создания</th>
        <th scope="col">Жанр</th>
        <th scope="col">Хит продаж</th>
        <th scope="col">Минимум книг на витрине</th>
        <th scope="col"></th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let book of books; index as i">
        <th scope="row">{{i + 1}}</th>
        <td>{{book.name}}</td>
        <td>{{book.createdAt | date:'dd.MM.yyyy HH:mm:ss'}}</td>
        <td>{{GenreEnum[book.genre]}}</td>
        <td><i *ngIf="book.bestseller" class="fa fa-check text-success" aria-hidden="true"></i></td>
        <td><span class="percentage-value">{{book.percentageCopiesOnDisplay}}</span>%</td>
        <td class="action-icons">
          <a href="#"><i class="fa fa-pencil text-primary" aria-hidden="true"></i></a>
          <a href="#"><i class="fa fa-trash-o text-danger" aria-hidden="true"></i></a>
        </td>
      </tr>
      </tbody>
    </table>

  </div>
</div>
