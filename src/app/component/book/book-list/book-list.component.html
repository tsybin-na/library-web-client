<div class="container">

  <div class="button-panel">
    <a class="btn btn-primary" data-toggle="modal" data-target="#bookModal" role="button">Добавить книгу</a>
    <a class="btn btn-primary" role="button" (click)="init()">Обновить</a>
  </div>

  <div class="table-responsive">
    <table class="table table-hover">
      <thead>
      <tr>
        <th scope="col">#</th>
        <th scope="col">Наименование</th>
        <th scope="col">Дата создания</th>
        <th scope="col">Жанр</th>
        <th scope="col">Хит продаж</th>
        <th scope="col">Минимальный % книг на витрине</th>
        <th scope="col"></th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let book of books; index as i">
        <th scope="row">{{i + 1}}</th>
        <td>{{book.name}}</td>
        <td>{{book.createdAt | date:'dd.MM.yyyy HH:mm:ss'}}</td>
        <td>{{GenreEnum[book.genre]}}</td>
        <td><i *ngIf="book.bestseller" class="fa fa-check text-success" aria-hidden="true"></i></td>
        <td>{{book.percentageCopiesOnDisplay}}</td>
        <td>
          <div class="action-icons">
            <a href="#"><i class="fa fa-pencil text-primary" aria-hidden="true"></i></a>
            <a href="#"> <i class="fa fa-trash-o text-danger" aria-hidden="true"></i></a>
          </div>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
